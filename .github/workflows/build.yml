name: Build V8 (multi-platform)

on:
  workflow_dispatch:
  push:
    paths:
      - '.v8-version'
      - '.github/workflows/build-v8.yml'

env:
  V8_REF: 15.1.154

jobs:
  build-v8:
    strategy:
      fail-fast: false
      matrix:
        flavor: [full, stripped, debug]
        combo:
          - { os: ubuntu-latest,     target_os: linux, target_cpu: x64 }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: x86 }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: arm }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: arm64 }
          - { os: windows-latest,    target_os: win,   target_cpu: x64 }
          - { os: windows-latest,    target_os: win,   target_cpu: x86 }
          - { os: macos-15-intel,    target_os: mac,   target_cpu: x64 }
          - { os: macos-latest,      target_os: mac,   target_cpu: arm64 }

    runs-on: ${{ matrix.combo.os }}

    steps:
      - name: Disable Git autocrlf (evita corromper o .digests do depot_tools no Windows)
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Set working directory
        id: workdir
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mkdir -p /d/v8work
            echo "dir=D:/v8work" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${{ github.workspace }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache depot_tools + V8 checkout
        uses: actions/cache@v4
        id: v8-src-cache
        with:
          path: |
            ${{ steps.workdir.outputs.dir }}/depot_tools
            ${{ steps.workdir.outputs.dir }}/v8
          key: v8-src-${{ runner.os }}-${{ env.V8_REF }}

      - name: Fetch V8 source
        if: steps.v8-src-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          git clone -c core.autocrlf=false https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$PWD/depot_tools:$PATH"
          fetch v8
          cd v8
          git checkout "${{ env.V8_REF }}"
          gclient sync

      - name: Cache build output
        uses: actions/cache@v4
        id: v8-build-cache
        with:
          path: ${{ steps.workdir.outputs.dir }}/v8/out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}
          key: v8-build-${{ runner.os }}-${{ env.V8_REF }}-${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}

      - name: Install Linux cross sysroot
        if: matrix.combo.target_os == 'linux' && steps.v8-build-cache.outputs.cache-hit != 'true'
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=${{ matrix.combo.target_cpu }}

      - name: Generate build files
        if: steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8

          # Args comuns a todas as variantes (flavors)
          BASE_ARGS='
            target_os="${{ matrix.combo.target_os }}"
            target_cpu="${{ matrix.combo.target_cpu }}"
            v8_monolithic=true
            v8_static_library=true
            is_component_build=false
            v8_use_external_startup_data=false
            v8_enable_webassembly=true
            v8_enable_sandbox=false
          '

          case "${{ matrix.flavor }}" in
            full)
              # V8 "padrão": todos os recursos habilitados (i18n, inspector,
              # disassembler, gdbjit), release otimizado, sem debug info.
              FLAVOR_ARGS='
                is_debug=false
                v8_enable_i18n_support=true
                v8_enable_inspector=true
                v8_enable_disassembler=true
                v8_enable_gdbjit=true
              '
              ;;
            stripped)
              # Build mínima: só o necessário pra rodar Wasm, sem recursos
              # de debugging/i18n, sem debug info -> binário bem menor.
              FLAVOR_ARGS='
                is_debug=false
                v8_enable_i18n_support=false
                v8_enable_inspector=false
                v8_enable_disassembler=false
                v8_enable_gdbjit=false
                symbol_level=0
              '
              ;;
            debug)
              # Build de debug completa: todos os recursos + símbolos cheios.
              FLAVOR_ARGS='
                is_debug=true
                v8_enable_i18n_support=true
                v8_enable_inspector=true
                v8_enable_disassembler=true
                v8_enable_gdbjit=true
                symbol_level=2
              '
              ;;
          esac

          gn gen "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" \
            --args="$BASE_ARGS $FLAVOR_ARGS"

      - name: Build v8_monolith
        if: steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          ninja -C "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" v8_monolith

      - name: Package artifact
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          OUT_DIR="v8/out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}"
          mkdir -p dist/include
          cp -r v8/include/* dist/include/
          if [ "${{ matrix.combo.target_os }}" = "win" ]; then
            cp "$OUT_DIR/obj/v8_monolith.lib" dist/ || true
          else
            cp "$OUT_DIR/obj/libv8_monolith.a" dist/ || true
            # Só remove símbolos de debug nas variantes que não são "debug"
            if [ "${{ matrix.flavor }}" != "debug" ]; then
              strip -S dist/libv8_monolith.a 2>/dev/null || strip --strip-debug dist/libv8_monolith.a 2>/dev/null || true
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}
          path: ${{ steps.workdir.outputs.dir }}/dist/
          retention-days: 30